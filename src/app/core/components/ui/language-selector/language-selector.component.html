<button tuiButton
  type="button"
  class="!h-fit !m-0 !px-2 !py-1 !rounded-lg"
  size="l"
  appearance="flat"
  tuiDropdownAlign="right"
  [tuiAppearanceState]="open() ? 'active' : null"
  [tuiDropdown]="dropdown"
  [tuiDropdownSided]="false"
  [(tuiDropdownOpen)]="open"
>
  <span class="!text-2xl">{{ selectedOption?.flag }}</span>
</button>

<ng-template #dropdown let-close>
  <tui-data-list>
    <tui-opt-group>
      @for (opt of options; track opt; let i = $index) {
        <button
          tuiOption
          type="button"
          (click)="onLangChange(opt)"
        >
          <span class="!pr-4">{{ opt.flag }}</span> {{ opt.name }}
        </button>
      }
    </tui-opt-group>
  </tui-data-list>
</ng-template>
